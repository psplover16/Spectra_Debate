schema: spec-driven

context: |
  專案類型：AI 辯論平台。使用者輸入辯題並指定正方或反方，由 codexCli 與 claudeCli 兩個本地 CLI 輪流發言進行辯論。

  架構：前端 UI + 本地 Node bridge（單機執行）。
    - 前端：html + css + javascript，瀏覽器執行；無遠端後端、無資料庫；狀態以 localStorage 持久化、長期保存以匯出檔承擔。
    - 本地 Node bridge（`bridge.js`）：監聽 `127.0.0.1`（拒絕外部裝置接入），作為瀏覽器 ↔ CLI 中介。瀏覽器無法直接 spawn 本地進程，故需此 bridge 把 codexCli / claudeCli 的子程序輸出經 SSE 推回前端。
    - CLI 整合：codexCli 與 claudeCli 由 bridge 以 `child_process.spawn` + `shell: false` 呼叫，兩者輪流發言。**預設**同一場辯論中角色固定（一方正、一方反），但設計上需保留「中途交換 CLI 與立場對應」的可能性（例如交叉提問、角色互換練習）；不得寫死「某 CLI 永遠等於某立場」的耦合。
    - 回合制：每回合僅一方發言，需明確標示當前發言者（哪個 CLI）、立場（正方／反方）、回合編號；發言紀錄需可回溯每一回合是哪個 CLI 代表哪一方。

  辯論領域語彙（請於規格與提案中統一使用）：
    - 辯題（topic）、立場（正方 / 反方）、回合（turn）、發言（statement）、結辯（closing）、判定（judgement）。

  語言與編碼：
    - 所有規格、提案、tasks、commit message 一律以繁體中文撰寫。
    - 所有檔案以 UTF-8（不含 BOM 汙染可見文字）儲存，禁止亂碼或問號替代字元。

  檔案存取限制：
    - 不得讀取或修改 `_private/_private_notes/筆記.txt`。
    - `_private/_private_notes/` 與 `_private/_private_fileAssets/` 之下，名為 `done` 的資料夾（含其所有子檔案）皆不得存取。
    - 除非明確要求，否則忽略個人筆記與學習資料。

rules:
  proposal:
    - 必須說明 codexCli 與 claudeCli 在本次變更中的預設角色分工（預設場中角色固定）；若本次變更涉及中途互換立場的情境，需額外描述觸發條件、互換次數限制與使用者操作流程。
    - 必須包含「非目標（Non-goals）」段落，明列本次變更不處理的範圍。
    - 涉及 UI 行為時，需描述回合切換、發言中斷與錯誤狀態的使用者體驗。

  spec:
    - 涉及外部 CLI 呼叫的能力，必須明列：輸入格式、輸出格式、逾時時間、失敗重試策略。
    - 回合制流程需明確規範：誰先發言、最多幾回合、何時進入結辯、何時判定結束；若涉及 CLI 立場互換，需規範互換的觸發條件與紀錄方式。
    - 發言紀錄資料結構必須同時保存「CLI 名稱」與「該回合的立場」，不得僅以 CLI 名稱推論立場。
    - UI 規格需涵蓋：當前發言者顯示、歷史發言捲動、CLI 執行中的等待狀態。

  tasks:
    - 任務粒度控制在可於單次 PR 內完成（約 2 小時以內）。
    - 涉及 CLI 整合的任務必須附上手動驗證步驟（如：示範指令、預期輸出片段）。
    - 純前端任務需註明驗證所用的瀏覽器與開啟方式（本地檔案 / 本地伺服器）。
